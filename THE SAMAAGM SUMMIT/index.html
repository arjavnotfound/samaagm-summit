        <section aria-label="About The Samaagm Summit">
          <h2>About TSS</h2>
          <p>The Samaagm Summit is a youth-driven conference designed to bring together students, thinkers, and future leaders onto one platform. Built around meaningful dialogue, collaboration, and real-world problem solving.</p>
          <p>At its core, TSS hosts a <strong>Model United Nations (MUN)</strong> — where participants take on roles of global representatives and engage in structured debates on pressing international and social issues.</p>
          <p>The Samaagm Summit is not just another conference — it is an experience that combines intellectual discussion with engagement, participation, and innovation.</p>
          <h3>Model United Nations</h3>
          <p>Structured debates where you represent nations, propose resolutions, and engage with pressing global challenges.</p>
          <h3>Democratic Format</h3>
          <p>Participants vote on pre-curated agenda options, helping shape the final committees and topics.</p>
        </section>

        <section aria-label="Democratic Vision">
          <h2>A Summit Shaped by Its Delegates</h2>
          <p>Before the conference, a series of interactive voting rounds on Instagram allows participants to choose between carefully curated agenda options. These votes help determine which topics and committees will ultimately be featured at the summit.</p>
          <p>A conference that is not just <em>for</em> the delegates — but <em>shaped with them</em>.</p>
          <h3>Voted Agendas</h3>
          <p>The community votes on Instagram to decide which topics get debated at each committee.</p>
          <h3>Curated Experiences</h3>
          <p>From music selection to event format — participants influence the environment they walk into.</p>
        </section>

          <h2>Founded by Students, Built for Students</h2>
